<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
        }
        .container{
            background-color: white;
            padding:30px;
            border-radius:15px;
            box-shadow : 0px opx 15px gray;
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;   
        }

        h1{
            color:brown;
        }

        input{
            width:250px;
            padding:8px;
        }
        h2{
            font-size: 22px;
        }
        button{
            width: 250px;
            padding:10px 20px;
            font-size: 16px;
            background-color: brown;
            color:white;
            border-radius: 5px;
            border:none
            
        }
        button:hover{
            background-color: darkgreen;

        }
        a{
            color:blue
        }
        
    </style>
</head>
<body>


    <script>
        function Registrationvalidation(){
            var name= document.myRegistration.fullname.value;
            var mail= document.myRegistration.email.value;
            var tele= document.myRegistration.phonenumber.value;
            var uname= document.myRegistration.username.value;
            var pass= document.myRegistration.password.value;
            var pas1= document.myRegistration.password2.value;
            if(name == "" || name==null){
                alert("Name cannot be empty");
                return false;
            }

    
            if(mail.indexOf("@") == -1 || mail.indexOf(".") == -1){
                alert("Enter valid email");
                return false;
            }

   
            if(tele.length != 10){
                alert("Phone number must contain 10 digits");
                return false;
            }   
            if(uname.length < 5){
                alert("Username must contain minimum 5 characters");
                return false;
            }

   
            if(pass.length < 6){
                alert("Password must contain minimum 6 characters");
                return false;
            }

    
            if(pass != pas1){
                alert("Passwords do not match");
                return false;
            }

            alert("Registration Successful");
            return true;
             }
    </script>
    <h1 > Registration Page</h1>
    <div class="container">
    <form name="myRegistration" action = "LoginSuccess.html" onsubmit="return Registrationvalidation()">
        <input type ="text" name = "fullname" placeholder="Enter Full Name" required ><br><br>
        <input type ="email" name = "email" placeholder="Enter Email" required ><br><br>
        <input type ="tel" name = "phonenumber" placeholder="Enter Valid Phone number" required ><br><br>
        <input type ="text" name = "username" placeholder="Enter Username" required ><br><br>
        <input type ="password" name = "password" placeholder="Enter Password" required ><br><br>
        <input type ="password" name = "password2" placeholder="Confirm Password" required ><br><br>

        <button type="submit">Register</button>

    </form>
    </div>
    <p>Already have an Account? <a href="loginsuccess.html"> Login</a></p><br>


    <nav>
        <a href="index.html">Back to Home</a>
        
    </nav>
     
</body>
</html>
