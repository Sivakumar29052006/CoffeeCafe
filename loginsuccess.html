<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            margin: 0;
            display: flex; /* Centers the form horizontally and vertically */
            justify-content: center;
            align-items: center;
        }

        form {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px gray;
            width: 350px;
            text-align: center;
        }

        h2 {
            color: brown;
            margin-bottom: 20px;
        }

        input {
            width: 250px;
            padding: 10px;
            margin-bottom: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: brown;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #5d1919; /* Darker brown when hovering */
        }
    
    </style>
</head>
<body>
    <script>
        function loginvalidation(){
            var uname= document.myform.username.value;
            var pass= document.myform.password.value;
            if(uname==null || uname == ""){
                alert("Name cant be blank!");
                return false
            }
            else if(pass.length<6){
                alert("Password must be exact 6 characters long!");
                return false
            }
    
              
        
    }
    </script>
    <form name="myform" action ="index.html" onsubmit="return loginvalidation()">
       <h2 > Login Page</h2>
        <input type ="text" name = "username" placeholder="Enter username" ><br><br>
        <input type ="password" name = "password" placeholder="Enter password" ><br><br>
        <button type = "submit">Login</button>
    </form>
</body>
</html>
